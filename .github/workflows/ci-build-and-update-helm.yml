name: Online Boutique CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: 307857433476.dkr.ecr.us-east-1.amazonaws.com

jobs:

# 🔍 1. Detect Changed + New Services
  detect-changes:
    runs-on: [self-hosted]
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history (important)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Detect services dynamically
        id: set-matrix
        run: |
          echo "🔍 Detecting services..."

          # Changed + new files
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          NEW_FILES=$(git diff --name-only --diff-filter=A ${{ github.event.before }} ${{ github.sha }})

          echo "Changed files:"
          echo "$CHANGED_FILES"

          echo "New files:"
          echo "$NEW_FILES"

          SERVICES=()

          # Extract top-level directories
          ALL_DIRS=$(echo "$CHANGED_FILES $NEW_FILES" | tr ' ' '\n' | cut -d/ -f1 | sort -u)

          for DIR in $ALL_DIRS; do
            # Skip invalid folders
            if [[ "$DIR" == ".github" || "$DIR" == "" || "$DIR" == "README.md" ]]; then
              continue
            fi

            # Check if valid service (Dockerfile exists)
            if [ -f "$DIR/Dockerfile" ]; then
              SERVICES+=("\"$DIR\"")
            fi
          done

          # 🔥 Ensure build if image missing in ECR
          for DIR in $ALL_DIRS; do
            if [ -f "$DIR/Dockerfile" ]; then
              if ! aws ecr describe-images --repository-name $DIR --region $AWS_REGION > /dev/null 2>&1; then
                echo "⚠️ Missing image in ECR → forcing build for $DIR"
                SERVICES+=("\"$DIR\"")
              fi
            fi
          done

          # Remove duplicates
          UNIQUE=$(printf "%s\n" "${SERVICES[@]}" | sort -u | tr '\n' ',' | sed 's/,$//')

          if [ -z "$UNIQUE" ]; then
            JSON="[]"
          else
            JSON="[$UNIQUE]"
          fi

          echo "✅ Final detected services: $JSON"
          echo "services=$JSON" >> $GITHUB_OUTPUT

# 🐳 2. Build & Push Images
  build-and-push:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: [self-hosted]

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build & Push Image
        run: |
          SERVICE=${{ matrix.service }}
          TAG=${{ github.sha }}

          echo "🚀 Building $SERVICE with tag $TAG"

          docker build -t $ECR_REGISTRY/$SERVICE:$TAG ./$SERVICE
          docker push $ECR_REGISTRY/$SERVICE:$TAG

# 🔁 3. Update GitOps Repo
  update-values:
    needs: [detect-changes, build-and-push]
    if: ${{ needs.build-and-push.result == 'success' && needs.detect-changes.outputs.services != '[]' }}
    runs-on: [self-hosted]

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DEPLOYMENT_REPO }}
          ref: ${{ vars.DEPLOYMENT_REPO_BRANCH }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: deploy-repo

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update image tags per service
        working-directory: deploy-repo
        run: |
          TAG=${{ github.sha }}
          SERVICES='${{ needs.detect-changes.outputs.services }}'
          FILE=${{ vars.DEPLOYMENT_REPO_PATH }}

          echo "Updating services: $SERVICES"

          for SERVICE in $(echo $SERVICES | jq -r '.[]'); do
            echo "🔧 Updating $SERVICE"

            case $SERVICE in
              adservice)
                yq e ".adService.image.tag = \"$TAG\"" -i $FILE ;;
              cartservice)
                yq e ".cartService.image.tag = \"$TAG\"" -i $FILE ;;
              checkoutservice)
                yq e ".checkoutService.image.tag = \"$TAG\"" -i $FILE ;;
              currencyservice)
                yq e ".currencyService.image.tag = \"$TAG\"" -i $FILE ;;
              emailservice)
                yq e ".emailService.image.tag = \"$TAG\"" -i $FILE ;;
              frontend)
                yq e ".frontend.image.tag = \"$TAG\"" -i $FILE ;;
              loadgenerator)
                yq e ".loadGenerator.image.tag = \"$TAG\"" -i $FILE ;;
              paymentservice)
                yq e ".paymentService.image.tag = \"$TAG\"" -i $FILE ;;
              productcatalogservice)
                yq e ".productCatalogService.image.tag = \"$TAG\"" -i $FILE ;;
              recommendationservice)
                yq e ".recommendationService.image.tag = \"$TAG\"" -i $FILE ;;
              shippingservice)
                yq e ".shippingService.image.tag = \"$TAG\"" -i $FILE ;;
              *)
                echo "Skipping unknown service: $SERVICE" ;;
            esac
          done

      - name: Commit and push changes
        working-directory: deploy-repo
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add ${{ vars.DEPLOYMENT_REPO_PATH }}

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update image tags to ${{ github.sha }}"
            git push origin ${{ vars.DEPLOYMENT_REPO_BRANCH }}
          fi