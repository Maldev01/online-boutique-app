name: CI - build, scan, push, update-deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:  

  # pull_request:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  detect-changes:
    name: detect changed services
    runs-on: [self-hosted]
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - name: Checkout repo (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed services vs origin/main
        id: set-matrix
        run: |
          set -euo pipefail

          # list all services you want CI to consider (adjust to your repo)
          SERVICES=(frontend productcatalogservice cartservice checkoutservice currencyservice emailservice paymentservice recommendationservice shippingservice adservice shoppingassistantservice)

          # ensure origin/main exists
          git remote set-url origin "$(git config --get remote.origin.url)"
          git fetch origin main --depth=1 || true

          # compute changed files against origin/main (works for push & PR)
          # For PRs you might want to compare to base ref instead:
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            echo "PR detected, comparing against $BASE_REF"
            git fetch origin ${BASE_REF} --depth=1 || true
            CHANGED_FILES=$(git diff --name-only origin/${BASE_REF}...HEAD)
          else
            CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # build JSON array of services that have changes
          arr=()
          for s in "${SERVICES[@]}"; do
            if printf '%s\n' "$CHANGED_FILES" | grep -qE "^src/${s}/|^${s}/|^helm-chart/|^charts/online-boutique/"; then
              arr+=("\"${s}\"")
            fi
          done

          if [ ${#arr[@]} -eq 0 ]; then
            echo "No service directories changed — nothing to build"
            echo "services=[]" >> "$GITHUB_OUTPUT"
          else
            JSON="[${arr[*]}]"
            echo "Detected services: $JSON"
            echo "services=$JSON" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build & push changed images
    runs-on: [self-hosted]
    needs: detect-changes
    # skip if no services changed
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Compute ECR registry
        id: ecrinfo
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --allow-insecure-entitlements security.insecure

      - name: Build and push image (matrix)
        id: buildpush
        uses: docker/build-push-action@v4
        with:
          context: ./src/${{ matrix.service }}
          file: ./src/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.ecrinfo.outputs.registry }}/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.ecrinfo.outputs.registry }}/${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ steps.ecrinfo.outputs.registry }}/${{ matrix.service }}:cache
          cache-to: type=inline

      - name: Scan pushed image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ steps.ecrinfo.outputs.registry }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  update-values:
    needs: build-and-push
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOYMENT_REPO }}
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.DEPLOYMENT_REPO_BRANCH }}
          path: deploy-repo

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}    

      - name: Compute image repo & tag
        id: imageinfo
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Helm values (images.repository & images.tag)
        run: |
          FILE="deploy-repo/helm-chart/values.yaml"

          cp "$FILE" "${FILE}.bak"

          yq eval -i ".images.repository = \"${{ steps.imageinfo.outputs.registry }}\"" "$FILE"
          yq eval -i ".images.tag = \"${{ steps.imageinfo.outputs.tag }}\"" "$FILE"

          echo "Resulting values:"
          sed -n '1,200p' "$FILE"

      - name: Commit & push changes
        working-directory: deploy-repo
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add ${{ env.DEPLOYMENT_REPO_PATH }}
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update images.repository and images.tag to ${GITHUB_SHA}"
            git push origin HEAD:${{ env.DEPLOYMENT_REPO_BRANCH }}
          fi