name: Online Boutique CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service_name:
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: 307857433476.dkr.ecr.us-east-1.amazonaws.com

jobs:
  detect-changes:
    runs-on: [self-hosted]
    outputs:
      services: ${{ steps.detect.outputs.services }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect services dynamically
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # Manual test mode
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.service_name }}" ]]; then
            SERVICE="${{ inputs.service_name }}"

            if [[ -f "src/${SERVICE}/Dockerfile" ]]; then
              JSON="[\"${SERVICE}\"]"
              echo "Detected services: $JSON"
              echo "services=$JSON" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "ERROR: src/${SERVICE}/Dockerfile not found"
              exit 1
            fi
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          echo "Detecting services between $BEFORE and $AFTER"

          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            CHANGED_FILES=$(git ls-files 'src/*/*')
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "$AFTER")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Get unique service names from paths like src/<service>/...
          mapfile -t CANDIDATES < <(
            printf '%s\n' "$CHANGED_FILES" \
              | awk -F/ '$1=="src" && NF>=3 {print $2}' \
              | sort -u
          )

          SERVICES=()
          for SERVICE in "${CANDIDATES[@]}"; do
            if [[ -f "src/${SERVICE}/Dockerfile" ]]; then
              SERVICES+=("$SERVICE")
            fi
          done

          JSON='['
          first=true
          for SERVICE in "${SERVICES[@]}"; do
            if [[ "$first" == true ]]; then
              JSON+="\"${SERVICE}\""
              first=false
            else
              JSON+=",\"${SERVICE}\""
            fi
          done
          JSON+=']'

          echo "Detected services: $JSON"
          echo "services=$JSON" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: [self-hosted]

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        shell: bash
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail
          SERVICE="${{ matrix.service }}"
          TAG="${{ github.sha }}"

          echo "Building ${SERVICE} with tag ${TAG}"

          docker build -t "$ECR_REGISTRY/$SERVICE:$TAG" "./src/$SERVICE"
          docker push "$ECR_REGISTRY/$SERVICE:$TAG"

  update-values:
    needs: [detect-changes, build-and-push]
    if: ${{ needs.build-and-push.result == 'success' && needs.detect-changes.outputs.services != '[]' }}
    runs-on: [self-hosted]

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DEPLOYMENT_REPO }}
          ref: ${{ vars.DEPLOYMENT_REPO_BRANCH }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: deploy-repo

      - name: Install tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update image tags per service
        shell: bash
        working-directory: deploy-repo
        run: |
          set -euo pipefail

          TAG="${{ github.sha }}"
          SERVICES='${{ needs.detect-changes.outputs.services }}'
          FILE="${{ vars.DEPLOYMENT_REPO_PATH }}"

          echo "Updating services: $SERVICES"

          while IFS= read -r SERVICE; do
            [[ -z "$SERVICE" ]] && continue

            case "$SERVICE" in
              adservice)                KEY="adService" ;;
              cartservice)              KEY="cartService" ;;
              checkoutservice)          KEY="checkoutService" ;;
              currencyservice)          KEY="currencyService" ;;
              emailservice)             KEY="emailService" ;;
              frontend)                 KEY="frontend" ;;
              loadgenerator)            KEY="loadGenerator" ;;
              paymentservice)           KEY="paymentService" ;;
              productcatalogservice)    KEY="productCatalogService" ;;
              recommendationservice)    KEY="recommendationService" ;;
              shippingservice)         KEY="shippingService" ;;
              shoppingassistantservice) KEY="shoppingAssistantService" ;;
              *)                        KEY="" ;;
            esac

            if [[ -n "$KEY" ]]; then
              echo "Updating $SERVICE -> $KEY to tag $TAG"
              yq e ".${KEY}.image.tag = \"${TAG}\"" -i "$FILE"
            else
              echo "Skipping unknown service: $SERVICE"
            fi
          done < <(echo "$SERVICES" | jq -r '.[]')

      - name: Commit and push changes
        shell: bash
        working-directory: deploy-repo
        run: |
          set -euo pipefail

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add "${{ vars.DEPLOYMENT_REPO_PATH }}"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update image tags to ${{ github.sha }}"
            git push origin "${{ vars.DEPLOYMENT_REPO_BRANCH }}"
          fi